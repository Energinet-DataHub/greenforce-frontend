<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DataHub</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#00847c" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="theme-color" content="#00898a" />
    <!--- End Favicon -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap&family=Droid+Sans+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <style>
      /*
       * Startup splash shown before Angular bootstraps and while the initial
       * authentication / user-actors round-trip completes. Removed from the DOM
       * in main.ts once bootstrapApplication() resolves (which happens after
       * all app initializers have completed).
       */
      #dh-startup-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #ffffff;
        color: #00898a;
        font-family:
          "Open Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        z-index: 2147483647;
        transition: opacity 200ms ease-out;
      }

      #dh-startup-splash.dh-startup-splash--hidden {
        opacity: 0;
        pointer-events: none;
      }

      #dh-startup-splash .dh-startup-splash__spinner {
        width: 56px;
        height: 56px;
        border: 4px solid rgba(0, 137, 138, 0.15);
        border-top-color: #00898a;
        border-radius: 50%;
        animation: dh-startup-splash-spin 800ms linear infinite;
      }

      #dh-startup-splash .dh-startup-splash__label {
        font-size: 0.875rem;
        letter-spacing: 0.02em;
        color: #4a4a4a;
      }

      @keyframes dh-startup-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #dh-startup-splash .dh-startup-splash__spinner {
          animation: none;
        }
        #dh-startup-splash {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <datahub-app>
      <div id="dh-startup-splash" role="status" aria-live="polite">
        <div class="dh-startup-splash__spinner" aria-hidden="true"></div>
        <div class="dh-startup-splash__label" data-dh-splash-label>Indlæser DataHub…</div>
      </div>
      <script>
        /*
         * Localize the startup splash before Angular bootstraps.
         *
         * The user's language preference is persisted by `DhLanguageService`
         * under the `dh-language` key in localStorage (values: 'da' | 'en').
         * If no preference is stored yet, we fall back to Danish to match the
         * app's `defaultLang` in `dh-transloco.providers.ts`.
         *
         * Keep these inline strings aligned with the app's localization assets
         * if the corresponding loading text is updated in the future.
         */
        (function () {
          var translations = {
            da: { label: "Indlæser DataHub…", aria: "Indlæser DataHub" },
            en: { label: "Loading DataHub…", aria: "Loading DataHub" },
          };
          var lang = "da";
          try {
            var stored = window.localStorage.getItem("dh-language");
            if (stored && translations[stored]) lang = stored;
          } catch (_) {
            /* localStorage may be unavailable (e.g. privacy mode) - keep default */
          }
          var t = translations[lang];
          document.documentElement.setAttribute("lang", lang);
          var splash = document.getElementById("dh-startup-splash");
          if (splash) splash.setAttribute("aria-label", t.aria);
          var label = document.querySelector("[data-dh-splash-label]");
          if (label) label.textContent = t.label;
        })();
      </script>
    </datahub-app>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
