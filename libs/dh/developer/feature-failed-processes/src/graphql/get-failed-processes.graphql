query GetFailedProcesses {
  failedProcesses {
    totalCount
    items {
      id
      processType
      meteringPointId
      createdAt
      suspendedAt
      suspendReason
      suspendContext
      orchestrationInstanceId
      createdBy {
        id
        name
        glnOrEicNumber
        marketRole
      }
    }
  }
}
