<form [formGroup]="sendMessageTemplateForm"
  *transloco="let transloco; read: 'sendMessage.overview.form'"
  name="dh-send-raw-message-temp-props"
>

<watt-tabs>
  <watt-tab label="Fields">

<h2>Fields</h2>



<div formArrayName="arrayList">

    <div *ngFor="let fieldItem of sendMessageTemplateDto.fieldList; let i=index">

        <ng-container  [ngSwitch]="fieldItem.fieldType">
          <div *ngSwitchCase="'String'" >
            <!-- <h2>{{fieldItem.fieldType}}</h2> -->

        <watt-form-field size="normal">
          <watt-label class="watt-text-m">{{fieldItem.name}}</watt-label>

          <input
            wattInput
            type="text"
            [formControlName]="i"
          />


          <watt-hint>{{fieldItem.comment}}</watt-hint>
        </watt-form-field>
      </div>

      <div *ngSwitchCase="'DateTime'" >

    <watt-form-field size="normal">
      <watt-label class="watt-text-m">{{fieldItem.name}}</watt-label>

      <input
        wattInput
        type="text"
        [formControlName]="i"
      />


      <watt-hint>{{fieldItem.comment}}</watt-hint>
    </watt-form-field>
  </div>

  <div *ngSwitchCase="'CodeList'" >


<mat-form-field size="large" style="width: 400px;">
  <mat-label class="watt-text-m">{{fieldItem.name}}</mat-label>
  <mat-select [formControlName]="i">
    <!-- <mat-option>None</mat-option> -->
    <mat-option *ngFor="let codeItem of fieldItem.codeItemList" [value]="codeItem.code">{{codeItem.title}}</mat-option>
  </mat-select>
  <mat-hint>{{fieldItem.comment}}</mat-hint>
</mat-form-field>
<br/><br/>
<br/><br/>
</div>

      </ng-container>

  </div>

    </div>
  </watt-tab >
    <watt-tab  label="XML after changes">
      <br/>
      <span>Open XML in new browser window for better overview</span>
      <button (click)="openXmlInNewWindow()">Open XML in new window</button>
      <br/><br/>
      <!-- <textarea style="width: 90%; height: 400px;" name="xmlTemplate"
      [(ngModel)]="sendMessageTemplateDto.xmlTemplate"
      #xmlTemplate='ngModel'
      ></textarea> -->
      <!-- <watt-form-field size="normal">
        <watt-label class="watt-text-m">Xml template</watt-label>

        <input
          wattInput
          type="text"
          formControlName="xmlTemplate"
          [(ngModel)]="sendMessageTemplateDto.xmlTemplate"
        />
      </watt-form-field> -->
      <!-- {{sendMessageTemplateDto.xmlTemplate}} -->
  </watt-tab>
</watt-tabs>

<br/>
<br/><br/><br/>

<!-- [loading]="loading" -->
<watt-button
variant="primary"
type="submit"
size="large"

(click)="onSubmit()"
>{{ transloco('sendMessageButton') }}</watt-button
>

</form>

{{ sendMessageTemplateForm?.getRawValue() | json }}
