query GetBalanceResponsibleById($documentId: String!) {
  balanceResponsibleById(documentId: $documentId) {
    id
    energySupplierName {
      id
      displayName
    }
    balanceResponsibleName {
      id
      displayName
    }
    gridArea {
      id
      name
      code
      displayName
    }
    meteringPointType
    validPeriod
    receivedDateTime
    storageDocumentUrl
    supplier
    balanceResponsible
  }
}
