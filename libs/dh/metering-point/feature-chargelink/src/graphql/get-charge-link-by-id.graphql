query GetChargeLinkPeriodById($id: String!) {
  chargeLinkPeriodById(id: $id) {
    id
    amount
    period
    closed
    changes {
      created
      changeType
      effectiveDate
      factor
      previousFactor
    }
    charge {
      id
      code
      name
      type
      typeDisplayName
      displayName
      transparentInvoicing
      owner {
        id
        displayName
      }
    }
  }
}
