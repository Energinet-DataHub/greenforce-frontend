mutation CreateChargeLink(
  $chargeId: String!
  $meteringPointId: String!
  $newStartDate: DateTime!
  $factor: Int!
) {
  createChargeLink(
    input: {
      chargeId: $chargeId
      meteringPointId: $meteringPointId
      newStartDate: $newStartDate
      factor: $factor
    }
  ) {
    chargeLinkPeriod {
      ...ChargeLinkPeriodFields
      changes {
        created
        changeType
        effectiveDate
        factor
        previousFactor
      }
    }
  }
}
