mutation StartConversation(
  $subject: ConversationSubject!
  $meteringPointIdentification: String!
  $internalNote: String
  $content: String!
  $anonymous: Boolean!
  $receiver: ActorType!
  $energySupplierDate: DateTime
) {
  startConversation(
    startConversationInput: {
      subject: $subject
      meteringPointIdentification: $meteringPointIdentification
      internalNote: $internalNote
      content: $content
      anonymous: $anonymous
      receiver: $receiver
      energySupplierDate: $energySupplierDate
    }
  ) {
    string
  }
}

mutation StartElectricalHeatingConversation(
  $meteringPointIdentification: String!
  $internalNote: String
  $content: String!
  $anonymous: Boolean!
  $receiver: ActorType!
  $electricalHeatingFrom: DateTime!
  $electricalHeatingReductionPeriodFrom: DateTime!
  $electricalHeatingReductionPeriodTo: DateTime
  $attachedDocumentIds: [UUID!]!
) {
  startElectricalHeatingConversation(
    input: {
      anonymous: $anonymous
      meteringPointIdentification: $meteringPointIdentification
      internalNote: $internalNote
      content: $content
      receiver: $receiver
      electricalHeatingFrom: $electricalHeatingFrom
      electricalHeatingReductionPeriodFrom: $electricalHeatingReductionPeriodFrom
      electricalHeatingReductionPeriodTo: $electricalHeatingReductionPeriodTo
      attachedDocumentIds: $attachedDocumentIds
    }
  ) {
    string
  }
}
