query GetMeteringPointProcessById($id: String!, $meteringPointId: String!) {
  meteringPointProcessById(id: $id, meteringPointId: $meteringPointId) {
    id
    createdAt
    cutoffDate
    businessReason
    state
    availableActions
    steps {
      id
      step
      comment
      description
      completedAt
      dueDate

      actor {
        id
        displayName
      }
      state
      documentUrl
    }
    initiator {
      id
      displayName
      glnOrEicNumber
    }
  }
}
