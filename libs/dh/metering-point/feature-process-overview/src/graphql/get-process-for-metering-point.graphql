query GetMeteringPointProcessById($id: String!, $meteringPointId: String!) {
  meteringPointProcessById(id: $id, meteringPointId: $meteringPointId) {
    id
    createdAt
    cutoffDate
    businessReason
    state
    availableActions
    cancelledByProcess {
      id
      businessReason
      cutoffDate
    }
    steps {
      id
      step
      comment
      description
      completedAt

      actor {
        id
        displayName
      }
      actorRole
      state
      documentUrl
    }
    initiator {
      id
      displayName
      glnOrEicNumber
    }
    initiatorRole
  }
}
