query GetMeteringPointProcessById($id: String!) {
  meteringPointProcessById(id: $id) {
    id
    createdAt
    cutoffDate
    businessReason
    state
    availableActions
    steps {
      id
      step
      comment
      description
      completedAt
      dueDate

      actor {
        id
        name
      }
      state
      documentUrl
    }
    initiator {
      id
      displayName
    }
  }
}
