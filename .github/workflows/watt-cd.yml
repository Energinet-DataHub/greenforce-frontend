# Design System Frontend
name: Watt CD

permissions:
  contents: read
  id-token: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  push:
    branches:
      - main

jobs:
  #
  # Detect whether Watt changed in the merged commit
  #
  changes:
    runs-on: ubuntu-latest
    outputs:
      watt_affected: ${{ steps.watt_affected.outputs.affected }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Setup toolchains with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Is Watt affected?
        id: watt_affected
        uses: ./.github/actions/is-affected
        with:
          project: watt
          base: HEAD~1

  #
  # Deploy Storybook to Chromatic
  #
  chromatic_deployment:
    name: Deploy to Chromatic
    needs: changes
    if: ${{ needs.changes.outputs.watt_affected == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup toolchains with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@7804f34e4e59c0d9b3c856848f46ad96d7897429 # v17.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.chromatic_project_token }}
          exitZeroOnChanges: true
          buildScriptName: designsystem:build

  #
  # Publish npm package
  #
  npm_publish:
    name: Publish to NPM
    continue-on-error: true
    needs: changes
    if: ${{ needs.changes.outputs.watt_affected == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchains with mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Publish to npm
        run: bun nx run watt:publish --force

  #
  # Send notification to teams channel if deployment failed
  #
  dispatch_failed:
    needs: [chromatic_deployment, npm_publish]
    if: |
      always() &&
      contains(needs.*.result, 'failure')
    uses: Energinet-DataHub/.github/.github/workflows/notify-team.yml@workflows/v3
    with:
      team_name: TeamFrontend
      subject: "Deployment dispatch failed: Watt + UI"
    secrets: inherit
