name: CI orchestrator

permissions:
  actions: write
  checks: write
  contents: write
  id-token: write
  issues: read
  pull-requests: write
  attestations: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]

jobs:
  # Detect whether the PR touches paths that the .NET build cares about.
  # For merge_group events we skip detection and force the .NET job to run,
  # because the merge could combine changes from several PRs that
  # individually did not touch the backend.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend || 'true' }}
    steps:
      - if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/dh/api-dh/**'
              - '.github/workflows/dotnet-ci.yml'
              - '.github/workflows/ci-orchestrator.yml'
              - '.github/actions/dotnet-prepare-outputs/**'
              - '.github/actions/dotnet-tests-prepare-outputs/**'
              - 'global.json'

  dh_ci_frontend:
    uses: ./.github/workflows/pr.yml
    secrets: inherit

  dh_ci_dotnet:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/dotnet-ci.yml
    secrets: inherit

  #
  # Branch policy status check
  #
  allow_merge_ci_orchestrator:
    permissions: {}
    runs-on: ubuntu-latest
    needs: [dh_ci_frontend, dh_ci_dotnet]
    # Skipped jobs report result == "skipped" which is intentionally not
    # treated as failure or cancelled, so a frontend-only PR with the .NET
    # job skipped still passes the gate.
    if: |
      always()
    steps:
      - name: Verify if merge is allowed
        run: |
          echo "${{ toJSON(needs) }}"
          if [[ ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }} = true ]]; then
            echo "Failed"
            exit 1
          fi
