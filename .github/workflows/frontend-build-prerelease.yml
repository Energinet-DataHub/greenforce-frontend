# Reusable workflow: builds app-dh and publishes a prerelease tagged ui_frontend_<PR>.
# Works from both pull_request and push contexts:
#   - pull_request: checks out the PR branch head, targets pr head sha
#   - push (main):  checks out the pushed commit, targets github.sha
name: DH Frontend Build Prerelease

on:
  workflow_call: {}

permissions:
  attestations: write
  contents: write
  id-token: write

env:
  APP_NAME: app-dh

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Use PR branch name when called from a pull_request event,
          # fall back to the triggering commit SHA for push events.
          ref: ${{ github.event.pull_request.head.ref || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - name: Bun setup
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - name: Cache Bun packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --yarn

      - name: Production build
        run: bun run nx build ${{ env.APP_NAME }}

      - name: Optimize i18n assets
        run: bun run i18n:optimize:${{ env.APP_NAME }}

      - name: Get releaseversion strings
        id: get_releaseversion_strings
        uses: Energinet-Datahub/.github/.github/actions/github-get-releaseversion-strings@actions/v1
        with:
          release_name_prefix: ui_frontend

      - name: Setup Release
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp ${{ github.workspace }}/dist/apps/dh/${{ env.APP_NAME }}/3rdpartylicenses.txt ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp -R ${{ github.workspace }}/dist/apps/dh/${{ env.APP_NAME }}/browser/* ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp -R ${{ github.workspace }}/apps/dh/e2e-dh ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}

      - name: Generate SBOM for node_modules
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ./yarn.lock
          format: spdx-json
          output-file: ${{ github.workspace }}/sbom.spdx.json

      - name: Zip artifact
        uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554 # v0.7.6
        with:
          type: zip
          filename: ${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}
          directory: ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}
          sbom-path: ${{ github.workspace }}/sbom.spdx.json

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.get_releaseversion_strings.outputs.release_version }}"
          RELEASE_FILE="${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}"

          gh release delete "$RELEASE_TAG" --yes --cleanup-tag 2>/dev/null || true

          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --prerelease \
            --target "${{ github.event.pull_request.head.sha || github.sha }}" \
            --generate-notes \
            "$RELEASE_FILE"
