name: DH CI frontend New

on:
  push:
    branches:
      - main
  pull_request:

env:
  # NX_BRANCH: ${{ github.event.number }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  # NX_CI_EXECUTION_ID: ${{ github.run_id }}

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      # Uncomment this line to enable task distribution
      #- run: bunx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      - run: bun install --no-cache --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      # - run: bun nx record -- echo Hello World
      # When you enable task distribution, run the e2e-ci task instead of e2e
      - run: bun nx affected --parallel -t lint test build e2e
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: bun nx fix-ci
        if: always()
