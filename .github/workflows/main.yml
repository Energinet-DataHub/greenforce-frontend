# DataHub UI Frontend and BFF
name: DH CD

env:
  APP_NAME: app-dh
  NX_BRANCH: ${{ github.event.number }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_CI_EXECUTION_ID: ${{ github.run_id }}

permissions:
  contents: write

# on:
#   push:
#     branches:
#       - main

on:
  pull_request:
    branches:
      - main

concurrency:
  group: dh-cd

jobs:
  dotnet_ci_build:
    uses: Energinet-DataHub/.github/.github/workflows/dotnet-build-prerelease.yml@workflows/v1
    with:
      solution_file_path: apps/dh/api-dh/DataHub.WebApi.sln
      release_name_prefix: ui_dotnet
      sbom_root_directory: apps/dh/api-dh

  dotnet_promote_prerelease:
    needs: [dotnet_ci_build]
    uses: Energinet-DataHub/.github/.github/workflows/promote-prerelease.yml@workflows/v1
    with:
      release_name_prefix: ui_dotnet

  frontend_ci_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Bun setup
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --yarn

      - name: Production build
        run: bun run nx build ${{ env.APP_NAME }}

      - name: Optimize i18n assets
        run: bun run i18n:optimize:${{ env.APP_NAME }}

      - name: Get releaseversion strings
        id: get_releaseversion_strings
        uses: Energinet-Datahub/.github/.github/actions/github-get-releaseversion-strings@actions/v1
        with:
          release_name_prefix: ui_frontend

      - name: Setup Release
        shell: bash
        run: |
          mkdir -p ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp ${{ github.workspace }}/dist/apps/dh/${{ env.APP_NAME }}/3rdpartylicenses.txt ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp -R ${{ github.workspace }}/dist/apps/dh/${{ env.APP_NAME }}/browser/* ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ env.APP_NAME }}
          cp -R ${{ github.workspace }}/apps/dh/e2e-dh ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}

      - name: Generate SBOM for node_modules
        uses: anchore/sbom-action@v0
        with:
          file: ./yarn.lock
          format: spdx-json
          output-file: ${{ github.workspace }}/sbom.spdx.json

      - name: Zip artifact
        uses: thedoctor0/zip-release@master
        with:
          type: zip
          filename: ${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}
          directory: ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}

      - name: Attest SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}
          sbom-path: ${{ github.workspace }}/sbom.spdx.json

      - name: Create pre-release
        uses: Energinet-Datahub/.github/.github/actions/github-create-release@actions/v1
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ steps.get_releaseversion_strings.outputs.release_version }}
          prerelease: true
          title: ${{ steps.get_releaseversion_strings.outputs.release_version }}
          files: ${{ github.workspace }}/${{ steps.get_releaseversion_strings.outputs.release_version }}/${{ steps.get_releaseversion_strings.outputs.release_zip_filename }}

  frontend_promote_prerelease:
    needs: [frontend_ci_build]
    uses: Energinet-DataHub/.github/.github/workflows/promote-prerelease.yml@workflows/v1
    with:
      release_name_prefix: ui_frontend

  #
  # Dispatch deployment request
  #

  dispatch_deploment_event:
    runs-on: ubuntu-latest
    needs: [dotnet_promote_prerelease, frontend_promote_prerelease]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      !(
        needs.dotnet_promote_prerelease.result == 'skipped' &&
        needs.frontend_promote_prerelease.result == 'skipped'
      )
    steps:
      - run: echo "${{ toJSON(needs) }}"

      - uses: actions/create-github-app-token@v3
        name: Generate Github token
        id: generate_token
        with:
          app-id: ${{ vars.dh3serviceaccount_appid }}
          private-key: ${{ secrets.dh3serviceaccount_privatekey }}
          owner: Energinet-DataHub

      - name: Find associated pull request
        uses: Energinet-DataHub/.github/.github/actions/find-related-pr-number@actions/v1
        id: find_pull_request

      # - name: Repository Dispatch
      #   uses: peter-evans/repository-dispatch@v4
      #   with:
      #     token: ${{ steps.generate_token.outputs.token }}
      #     repository: ${{ vars.environment_repository_path }}
      #     event-type: ui-deployment-request-domain
      #     # yamllint disable-line rule:quoted-strings
      #     client-payload: '{"pr_number": "${{ steps.find_pull_request.outputs.pull_request_number }}", "dotnet": "true", "frontend": "true"}'

