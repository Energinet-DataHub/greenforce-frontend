name: DH CI Frontend
permissions:
  actions: write
  contents: write

on:
  workflow_call: {}
env:
  NX_BRANCH: ${{ github.event.number }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_CI_EXECUTION_ID: ${{ github.run_id }}-${{ github.run_attempt }}
  # DH E2E
  # Note: Cypress automatically removes the "CYPRESS_" prefix in CI
  CYPRESS_DH_E2E_USERNAME: ${{ vars.DH_E2E_U1_USERNAME }}
  CYPRESS_DH_E2E_PASSWORD: ${{ secrets.DH_E2E_U1_PASSWORD }}
  CYPRESS_DH_E2E_B2C_URL: https://b2cshresdevwe002.b2clogin.com
  # See https://github.com/cypress-io/cypress/issues/25357
  ELECTRON_EXTRA_LAUNCH_ARGS: --disable-gpu

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        name: Generate Github token
        id: generate_token
        with:
          client-id: ${{ vars.dh3serviceaccount_appid }}
          private-key: ${{ secrets.dh3serviceaccount_privatekey }}
          owner: Energinet-DataHub
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup toolchains with mise
        uses: jdx/mise-action@v4.0.1

      - run: bunx nx start-ci-run --distribute-on="3 linux-large" --stop-agents-after="e2e" --with-env-vars="CYPRESS_DH_E2E_USERNAME,CYPRESS_DH_E2E_PASSWORD,CYPRESS_DH_E2E_B2C_URL,ELECTRON_EXTRA_LAUNCH_ARGS"
      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"
      - name: Cache Bun packages
        uses: actions/cache@v5.0.4
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5.0.1
        id: nx_set_shas
      - name: "Lint and fix affected projects"
        run: bun run affected:lint:fix -- --base="$NX_BASE" --head="$NX_HEAD"

      - name: Generate graphQL schema
        run: bun nx run dh-shared-domain:generate

      - name: Read .allowed-licenses.json
        id: allowed-licenses
        shell: bash
        run: echo "FILE=$(jq -r .[] .allowed-licenses.json | tr '\n' ';')" >> $GITHUB_OUTPUT

      - name: Run license-checker
        id: licenseChecker
        run: echo DEPENDENCIES=$(npx license-checker-rseidelsohn@4.2.10 --direct=0 --production --onlyAllow="${{ steps.allowed-licenses.outputs.FILE }}" --json --excludePrivatePackages) >> $GITHUB_OUTPUT

      - name: Update PRODUCTION_DEPENDENCIES.md
        uses: ./.github/actions/update-production-dependencies-list
        with:
          dependencies-from-license-checker: ${{ steps.licenseChecker.outputs.DEPENDENCIES }}

      - name: Add license to all projects
        run: bun run nx g @energinet-datahub/tools/license:add -- --base="$NX_BASE" --head="$NX_HEAD"

      - name: Format projects and configuration files
        run: bun run format -- --base="$NX_BASE" --head="$NX_HEAD"

      - name: Bump Watt version if affected
        id: watt_affected
        uses: ./.github/actions/is-affected
        with:
          project: watt
          base: ${{ steps.nx_set_shas.outputs.base }}
          head: ${{ steps.nx_set_shas.outputs.head }}
      - name: Bump Watt peer dependencies and version
        if: ${{ steps.watt_affected.outputs.affected == 'true' }}
        run: |
          bun nx g @energinet-datahub/tools/package:peer-dependencies --project="watt" --packageJson="libs/watt/package/package.json"
          bun nx g @energinet-datahub/tools/package:version-bump --packageJson="libs/watt/package/package.json"

      - name: Commit CI QA fixes
        if: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "QA fixes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }} --force-with-lease
      - run: bun nx affected --parallel -t test build package --base="$NX_BASE" --head="$NX_HEAD"
      - name: "End-to-end test affected products"
        run: bun nx affected --parallel -t e2e --base="$NX_BASE" --head="$NX_HEAD"
      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-e2e
          path: dist/cypress/apps/
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: bun nx fix-ci
        if: always()
