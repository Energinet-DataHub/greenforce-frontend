name: DH CI Frontend
permissions:
  actions: write
  contents: write

on:
  workflow_call: {}
env:
  NX_BRANCH: ${{ github.event.number }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_CI_EXECUTION_ID: ${{ github.run_id }}
  # DH E2E
  # Note: Cypress automatically removes the "CYPRESS_" prefix in CI
  CYPRESS_DH_E2E_USERNAME: ${{ vars.DH_E2E_U1_USERNAME }}
  CYPRESS_DH_E2E_PASSWORD: ${{ secrets.DH_E2E_U1_PASSWORD }}
  CYPRESS_DH_E2E_B2C_URL: https://b2cshresdevwe002.b2clogin.com
  # See https://github.com/cypress-io/cypress/issues/25357
  ELECTRON_EXTRA_LAUNCH_ARGS: --disable-gpu

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        name: Generate Github token
        id: generate_token
        with:
          app-id: ${{ vars.dh3serviceaccount_appid }}
          private-key: ${{ secrets.dh3serviceaccount_privatekey }}
          owner: Energinet-DataHub
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup toolchains with mise
        uses: jdx/mise-action@v3

      - run: bunx nx start-ci-run --distribute-on="3 linux-large" --stop-agents-after="build"
      - name: Get Bun cache directory
        id: bun_cache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"
      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.bun_cache.outputs.dir }}
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - name: "Lint and fix affected projects"
        run: bun run nx affected -t lint --base="$NX_BASE" --head="$NX_HEAD" --parallel
      - name: Format projects and configuration files
        run: bun run format -- --base="$NX_BASE" --head="$NX_HEAD"

      - name: Commit lint and formatted files
        if: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "style: format and lint"
          git push origin HEAD:${{ github.event.pull_request.head.ref }} --force-with-lease
      - run: bun nx affected -t test build --base="$NX_BASE" --head="$NX_HEAD" --parallel
      - name: "PR: End-to-end test affected products"
        run: bun run affected -t e2e:ci --base="$NX_BASE" --head="$NX_HEAD" --parallel
      - name: Upload artifact
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-e2e
          path: dist/cypress/apps/
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: bun nx fix-ci
        if: always()
